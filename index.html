<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Token Intelligence</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Tokens">
<meta name="theme-color" content="#07090f">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--bg2:#0c0e18;--bg3:#111420;--bg4:#161924;
  --border:#1a1f30;--border2:#222840;
  --txt:#e4e8f4;--txt2:#8892b0;--txt3:#404868;
  --g:#00e8a0;--gbg:rgba(0,232,160,.07);--gbdr:rgba(0,232,160,.2);
  --r:#ff4060;--rbg:rgba(255,64,96,.07);--rbdr:rgba(255,64,96,.2);
  --y:#ffb800;--ybg:rgba(255,184,0,.07);--ybdr:rgba(255,184,0,.2);
  --b:#4d8aff;--bbg:rgba(77,138,255,.07);--bbdr:rgba(77,138,255,.2);
}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:32px}

/* HEADER */
.hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.96);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.hdr-brand{font-size:8px;font-weight:700;letter-spacing:4px;color:var(--txt3);margin-bottom:5px}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-title{font-size:19px;font-weight:900;letter-spacing:-.3px}
.hdr-date{font-size:9px;color:var(--txt3);margin-top:3px}
.hdr-right{text-align:right}
.global-score{font-size:30px;font-weight:900;font-family:'Space Mono',monospace;line-height:1}
.status-row{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;justify-content:flex-end}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.pill.on{background:var(--gbg);color:var(--g);border:1px solid var(--gbdr)}
.pill.off{background:var(--bg4);color:var(--txt3);border:1px solid var(--border2)}
.pill.loading{background:var(--bbg);color:var(--b);border:1px solid var(--bbdr)}
.pill.warn{background:var(--ybg);color:var(--y);border:1px solid var(--ybdr)}
.dot-live{width:5px;height:5px;border-radius:50%;background:var(--g);animation:dp 1.8s infinite;display:inline-block}
@keyframes dp{0%{box-shadow:0 0 0 0 rgba(0,232,160,.5)}70%{box-shadow:0 0 0 5px rgba(0,232,160,0)}100%{box-shadow:0 0 0 0 rgba(0,232,160,0)}}

/* FETCH STATUS BAR */
.status-bar{padding:8px 16px;font-size:10px;font-weight:700;text-align:center;display:none;letter-spacing:.5px}
.status-bar.ok{display:block;background:var(--gbg);color:var(--g);border-bottom:1px solid var(--gbdr)}
.status-bar.err{display:block;background:var(--rbg);color:var(--r);border-bottom:1px solid var(--rbdr)}
.status-bar.loading{display:block;background:var(--bbg);color:var(--b);border-bottom:1px solid var(--bbdr)}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 18px;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border:none;background:transparent;color:var(--txt3);font-family:'Syne',sans-serif;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--txt);border-bottom-color:var(--b)}
.view{display:none}.view.active{display:block}

/* TOKEN LIST */
.tlist{display:flex;flex-direction:column;gap:10px;padding:14px}

/* TOKEN CARD */
.tc{border-radius:14px;border:1px solid var(--border2);background:var(--bg2);overflow:hidden;transition:border-color .3s}
.tc.hot{border-color:var(--gbdr)}.tc.warn{border-color:var(--ybdr)}.tc.cold{border-color:var(--border2)}.tc.danger{border-color:var(--rbdr)}
.tc-stripe{height:3px}

/* HEAD */
.tc-head{display:flex;align-items:center;gap:10px;padding:13px 14px 8px}
.tc-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.tc-info{flex:1;min-width:0}
.tc-sym{font-size:16px;font-weight:900}
.tc-phase{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--txt3);margin-top:3px;text-transform:uppercase}
.tc-right{text-align:right;flex-shrink:0}
.tc-price{font-size:17px;font-weight:700;font-family:'Space Mono',monospace}
.tc-be{font-size:8px;color:var(--txt3);margin-top:2px;font-family:'Space Mono',monospace}
.tc-pnl{font-size:10px;font-weight:700;margin-top:3px;font-family:'Space Mono',monospace}
.tc-tag{font-size:8px;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block;margin-top:3px}

/* MOMENTUM */
.mom{padding:0 14px 8px}
.mom-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.mom-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3)}
.mom-val{font-size:12px;font-weight:700;font-family:'Space Mono',monospace}
.mom-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.mom-bar{height:100%;border-radius:3px;transition:width .7s}

/* TP1 PROGRESS */
.tp1{padding:0 14px 10px}
.tp1-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tp1-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3)}
.tp1-val{font-size:10px;font-weight:700;font-family:'Space Mono',monospace}
.tp1-track{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;position:relative;margin-bottom:4px}
.tp1-fill{height:100%;border-radius:5px;transition:width .7s}
.tp1-be-mark{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.25);border-radius:1px}
.tp1-labs{display:flex;justify-content:space-between;font-size:8px;color:var(--txt3);font-family:'Space Mono',monospace}

/* MA SECTION */
.mas{padding:0 14px 8px}
.mas-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mas-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3)}
.mas-src{font-size:8px;font-weight:700;padding:1px 6px;border-radius:4px}
.mas-src.auto{background:var(--gbg);color:var(--g);border:1px solid var(--gbdr)}
.mas-src.manual{background:var(--bg4);color:var(--txt3);border:1px solid var(--border2)}
.mas-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:6px}
.ma-box{background:var(--bg3);border-radius:7px;padding:8px;border:1px solid var(--border)}
.ma-box.above{border-color:rgba(0,232,160,.25)}
.ma-box.below{border-color:rgba(255,64,96,.2)}
.ma-box-lbl{font-size:7px;font-weight:700;letter-spacing:1px;color:var(--txt3);margin-bottom:4px;text-transform:uppercase}
.ma-box-val{font-size:12px;font-weight:700;font-family:'Space Mono',monospace;margin-bottom:3px}
.ma-box-sig{font-size:8px;font-weight:700}
.ma-signals{display:flex;flex-wrap:wrap;gap:4px}
.ma-sig-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.3px}

/* VOLUME */
.vol{padding:0 14px 8px}
.vol-row{display:flex;align-items:center;gap:10px}
.vol-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3);flex-shrink:0;width:62px}
.vol-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.vol-fill{height:100%;border-radius:3px;transition:width .6s}
.vol-num{font-size:10px;font-weight:700;font-family:'Space Mono',monospace;flex-shrink:0;text-align:right;min-width:64px}

/* CATALYSTS */
.cats{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 8px}
.cat{font-size:8px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.3px;display:flex;align-items:center;gap:3px}
.cat.on{background:var(--gbg);color:var(--g);border:1px solid var(--gbdr)}
.cat.pend{background:var(--ybg);color:var(--y);border:1px solid var(--ybdr)}
.cat.off{background:var(--bg4);color:var(--txt3);border:1px solid var(--border2);opacity:.55}

/* DECISION */
.dec{margin:0 14px 10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3)}
.dec.extend{border-color:var(--gbdr);background:var(--gbg)}.dec.hold{border-color:var(--ybdr);background:var(--ybg)}
.dec.wait{border-color:var(--border)}.dec.danger{border-color:var(--rbdr);background:var(--rbg)}
.dec-lbl{font-size:8px;font-weight:800;letter-spacing:2px;margin-bottom:4px;text-transform:uppercase}
.dec.extend .dec-lbl{color:var(--g)}.dec.hold .dec-lbl{color:var(--y)}.dec.wait .dec-lbl{color:var(--txt3)}.dec.danger .dec-lbl{color:var(--r)}
.dec-txt{font-size:11px;color:var(--txt2);line-height:1.6}

/* NOTE */
.tc-note{padding:8px 14px 12px;font-size:10px;color:var(--txt3);line-height:1.6;border-top:1px solid var(--border)}

/* SAVE BAR */
.save-bar{padding:12px 14px 16px;display:flex;flex-direction:column;gap:8px}
.btn{padding:12px;border-radius:9px;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:'Syne',sans-serif;text-align:center;border:none}
.btn-prices{background:var(--bbg);color:var(--b);border:1px solid var(--bbdr)}
.btn-ma{background:var(--gbg);color:var(--g);border:1px solid var(--gbdr)}
.btn-save{background:var(--b);color:#fff}
.save-ok{display:none;text-align:center;font-size:10px;color:var(--g);padding:4px;letter-spacing:1px}

/* SUMMARY */
.sum-card{margin:14px;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px}
.sum-lbl{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--txt3);margin-bottom:6px;text-transform:uppercase}
.sum-score{font-size:46px;font-weight:900;font-family:'Space Mono',monospace;line-height:1}
.sum-sub{font-size:11px;color:var(--txt3);margin-top:6px;line-height:1.5}
.section-lbl{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--txt3);padding:12px 14px 6px;text-transform:uppercase}
.rank-list{display:flex;flex-direction:column;gap:6px;padding:0 14px 14px}
.rank-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.rr-n{font-size:10px;color:var(--txt3);font-family:'Space Mono',monospace;width:16px;flex-shrink:0}
.rr-sym{font-size:13px;font-weight:900;width:36px;flex-shrink:0}
.rr-bar{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.rr-fill{height:100%;border-radius:3px}
.rr-score{font-size:11px;font-weight:700;font-family:'Space Mono',monospace;width:32px;text-align:right;flex-shrink:0}
.rr-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0}
.tp1-rank{display:flex;flex-direction:column;gap:5px;padding:0 14px 14px}
.tp1-rank-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:8px 12px}

/* HISTORY */
.hist-empty{text-align:center;padding:40px;color:var(--txt3);font-size:12px;line-height:2}
.hday{margin:0 14px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.hday-hdr{padding:8px 12px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.hday-hdr-date{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3);text-transform:uppercase}
.hday-hdr-avg{font-size:10px;font-weight:700;font-family:'Space Mono',monospace}
.hday-row{display:flex;align-items:center;gap:5px;padding:7px 12px;border-bottom:1px solid var(--border)}
.hday-row:last-child{border:none}
.hr-sym{font-size:11px;font-weight:800;width:32px;flex-shrink:0}
.hr-price{font-size:9px;font-family:'Space Mono',monospace;width:58px;flex-shrink:0}
.hr-rsi{font-size:9px;font-family:'Space Mono',monospace;width:38px;color:var(--txt3);flex-shrink:0}
.hr-ma20{font-size:9px;font-family:'Space Mono',monospace;width:54px;color:var(--txt3);flex-shrink:0}
.hr-score{font-size:10px;font-weight:700;font-family:'Space Mono',monospace;flex:1;text-align:right}
.hr-dec{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;flex-shrink:0}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tc{animation:fadeIn .22s ease both}
</style>
</head>

// CALCULATIONS
// ═══════════════════════════════════════════════════════════════
function calcSMA(arr, n){
  if(arr.length < n) return 0;
  return arr.slice(-n).reduce(function(a,b){return a+b;},0)/n;
}

function calcRSI(closes){
  if(closes.length < 15) return 50;
  var gains=0, losses=0;
  for(var i=closes.length-14; i<closes.length; i++){
    var d = closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses+=Math.abs(d);
  }
  var avgG=gains/14, avgL=losses/14;
  if(avgL===0) return 100;
  return Math.min(99, Math.max(1, Math.round(100-(100/(1+avgG/avgL)))));
}

function classifyVol(todayVol, recentVols){
  if(!todayVol||!recentVols.length) return 'normal';
  var avg = recentVols.reduce(function(a,b){return a+b;},0)/recentVols.length;
  if(avg===0) return 'normal';
  var r = todayVol/avg;
  return r>1.4?'alto':r<0.65?'bajo':'normal';
}

function fmtVol(v){
  if(!v||v<=0) return '—';
  if(v>=1e9)  return (v/1e9).toFixed(2)+'B';
  if(v>=1e6)  return (v/1e6).toFixed(2)+'M';
  if(v>=1e3)  return (v/1e3).toFixed(1)+'K';
  return Math.round(v).toString();
}

var techQueue = [];
var techResults = {};
var techDone = 0;

function fetchTechnicals(){
  var btn = document.getElementById('btnMA');
  btn.textContent = '📊  CALCULANDO...';
  setStatus('loading','⟳ Descargando histórico de precios para calcular MAs y RSI... (puede tardar ~15s)');
  setPill('pillMA','loading','⟳ MAs/RSI');
  techDone=0; techResults={};

  // Fetch one by one to avoid rate limiting
  fetchNextTechnical(0, btn);
}

function fetchOneTechnical(t, retries, onDone){
  var url = 'https://api.coingecko.com/api/v3/coins/'+t.cgHistId+'/market_chart?vs_currency=usd&days=60&interval=daily';
  fetch(url, {signal:AbortSignal.timeout(18000)})
    .then(function(r){
      if(r.status===429){
        // Rate limited — wait 3s and retry
        if(retries>0){
          setTimeout(function(){fetchOneTechnical(t, retries-1, onDone);}, 3000);
        } else { techResults[t.sym]=null; onDone(); }
        return;
      }
      if(!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(function(data){
      if(!data) return; // already handled above
      if(!data.prices||data.prices.length<20){
        techResults[t.sym]=null;
      } else {
        var prices = data.prices.map(function(p){return p[1];});
        var vols   = data.total_volumes.map(function(v){return v[1];});
        techResults[t.sym] = {
          sma9:calcSMA(prices,9), ma20:calcSMA(prices,20), ma50:calcSMA(prices,50),
          rsi:calcRSI(prices),
          volDia:vols[vols.length-1],
          vol:classifyVol(vols[vols.length-1], vols.slice(-20,-1))
        };
      }
      onDone();
    })
    .catch(function(){
      if(retries>0){
        setTimeout(function(){fetchOneTechnical(t, retries-1, onDone);}, 2000);
      } else { techResults[t.sym]=null; onDone(); }
    });
}

function fetchNextTechnical(idx, btn){
  if(idx >= TK.length){
    applyTechnicals();
    btn.textContent='📊  ACTUALIZAR MAs Y RSI — Automático';
    var ok=Object.keys(techResults).filter(function(k){return techResults[k];}).length;
    if(ok===TK.length){
      setPill('pillMA','on','<span class="dot-live"></span> MAs AUTO');
      setStatus('ok','✓ MAs y RSI calculados para '+ok+'/'+TK.length+' tokens');
    } else {
      setPill('pillMA','warn','⚠ MAs PARCIAL '+ok+'/'+TK.length);
      setStatus('err','⚠ '+ok+'/'+TK.length+' tokens calculados — los demás: introduce manualmente');
    }
    setTimeout(function(){setStatus('');},10000);
    return;
  }
  var t=TK[idx];
  setStatus('loading','📊 Calculando '+t.sym+' ('+(idx+1)+'/'+TK.length+')...');
  fetchOneTechnical(t, 2, function(){
    // 1.5s delay between tokens to avoid rate limiting
    setTimeout(function(){fetchNextTechnical(idx+1, btn);}, 1500);
  });
}

function applyTechnicals(){
  TK.forEach(function(t){
    var r=techResults[t.sym];
    if(!r) return;
    t.sma9=r.sma9; t.ma20=r.ma20; t.ma50=r.ma50;
    t.rsi=r.rsi; t.volDia=r.volDia; t.vol=r.vol;
    t.maAuto=true;
    if(t.price>0&&t.ma20>0&&t.sma9>0){
      if(t.price>t.ma20&&t.sma9>t.ma20) t.trend='alcista';
      else if(t.price<t.ma20&&t.sma9<t.ma20) t.trend='bajista';
      else t.trend='lateral';
    }
    // Populate manual input fields with calculated values
    var s9El=document.getElementById('mi_sma9_'+t.sym);
    var m2El=document.getElementById('mi_ma20_'+t.sym);
    var m5El=document.getElementById('mi_ma50_'+t.sym);
    var rsEl=document.getElementById('mi_rsi_'+t.sym);
    if(s9El) s9El.value=r.sma9.toFixed(t.sma9<1?5:t.sma9<10?4:t.sma9<100?3:2);
    if(m2El) m2El.value=r.ma20.toFixed(t.ma20<1?5:t.ma20<10?4:t.ma20<100?3:2);
    if(m5El) m5El.value=r.ma50.toFixed(t.ma50<1?5:t.ma50<10?4:t.ma50<100?3:2);
    if(rsEl) rsEl.value=r.rsi;
  });
  renderAll();
}

// SCORING
// ═══════════════════════════════════════════════════════════════
function getMaScore(t){
  var p=t.price, s9=t.sma9, m2=t.ma20, m5=t.ma50;
  if(!p||!m2) return 0;
  var sc=0;
  if(s9>0&&p>s9)  sc+=4;
  if(p>m2)         sc+=5;
  if(m5>0&&p>m5)  sc+=6;
  if(s9>0&&m2>0&&s9>m2) sc+=3;
  if(m2>0&&m5>0&&m2>m5) sc+=3;
  if(m2>0&&Math.abs(p-m2)/m2<0.04) sc+=2;
  return Math.min(23,sc);
}

function score(t){
  var s=0;
  s+=t.narr*0.22;
  var on=t.cats.filter(function(c){return c.s===1;}).length;
  var pend=t.cats.filter(function(c){return c.s===null;}).length;
  s+=(on/t.cats.length)*18+(pend/t.cats.length)*3;
  var rsi=parseFloat(t.rsi)||50;
  s+=rsi>=40&&rsi<=70?16:rsi>=30&&rsi<40?11:rsi<30?7:rsi>80?4:10;
  s+=t.trend==='alcista'?12:t.trend==='lateral'?6:1;
  s+=getMaScore(t);
  s+=t.vol==='alto'?10:t.vol==='normal'?6:2;
  return Math.min(100,Math.round(s));
}

function scoreColor(s){ return s>=75?'var(--g)':s>=50?'var(--y)':s>=30?'var(--txt2)':'var(--r)'; }
function scoreClass(s){ return s>=75?'hot':s>=50?'warn':s>=30?'cold':'danger'; }

function getMaSignals(t){
  var p=t.price, s9=t.sma9, m2=t.ma20, m5=t.ma50;
  var out=[];
  if(!p||!m2) return out;
  if(s9>0) out.push(p>s9?{txt:'P > SMA9',c:'var(--g)'}:{txt:'P < SMA9',c:'var(--r)'});
  out.push(p>m2?{txt:'P > MA20',c:'var(--g)'}:{txt:'P < MA20',c:'var(--r)'});
  if(m5>0) out.push(p>m5?{txt:'P > MA50',c:'var(--g)'}:{txt:'P < MA50',c:'var(--r)'});
  // Golden Cross: MA20 > MA50 (bullish alignment)
  if(m2>0&&m5>0&&m2>m5) out.push({txt:'Golden Cross 🌟',c:'var(--g)'});
  // Death Cross: MA20 < MA50 (bearish alignment)
  else if(m2>0&&m5>0&&m2<m5) out.push({txt:'Death Cross ⚠️',c:'var(--r)'});
  return out;
}

function decision(t,sc){
  var ratio=t.price>0&&t.be>0?t.price/t.be:0;
  var bulls=getMaSignals(t).filter(function(m){return m.c==='var(--g)';}).length;
  if(sc>=80&&ratio>=0.90) return{cls:'extend',lbl:'⬆ EXTENDER TP',txt:'Momentum excepcional con precio cerca del BE. Los catalizadores y MAs sugieren que el token puede superar los TPs actuales.'};
  if(sc>=80)              return{cls:'hold',  lbl:'◉ ALTA CONVICCIÓN — MANTENER',txt:'Momentum muy fuerte. Catalizadores activos. Mantener posición completa.'};
  if(sc>=55&&bulls>=3)    return{cls:'hold',  lbl:'→ MANTENER — MAs ALCISTAS',txt:'Momentum moderado con MAs alineadas al alza. Ejecutar sin dudar cuando llegue el TP1.'};
  if(sc>=55)              return{cls:'hold',  lbl:'→ MANTENER TPs ACTUALES',txt:'Momentum moderado. Los catalizadores están en proceso. Ejecutar sin dudar cuando llegue el TP1.'};
  if(sc>=30)              return{cls:'wait',  lbl:'⏳ ESPERAR CATALIZADORES',txt:'Momentum bajo. Precio bajo las MAs. Mantener en staking y esperar.'};
  return                         {cls:'danger',lbl:'⚠ REVISIÓN ESTRATÉGICA',txt:'Múltiples señales débiles. No actuar impulsivamente.'};
}

// FORMAT
// ═══════════════════════════════════════════════════════════════
function fp(v){
  v=parseFloat(v)||0;
  if(v>=10000) return '$'+Math.round(v).toLocaleString('en-US');
  if(v>=100)   return '$'+v.toFixed(2);
  if(v>=1)     return '$'+v.toFixed(3);
  if(v>=0.01)  return '$'+v.toFixed(4);
  return '$'+v.toFixed(5);
}

    html+='<div class="vol"><div class="vol-row"><span class="vol-lbl">VOLUMEN</span>'
      +'<div class="vol-track"><div class="vol-fill" style="width:'+volPct+'%;background:'+volCol+'"></div></div>'
      +'<span class="vol-num" style="color:'+volCol+'">'+(t.volDia>0?fmtVol(t.volDia):t.vol.toUpperCase())+'</span></div></div>';

    // CATALYSTS
    html+='<div class="cats">'+t.cats.map(function(c){
      var cls2=c.s===1?'on':c.s===null?'pend':'off';
      return '<div class="cat '+cls2+'">'+(c.s===1?'✓':c.s===null?'⏳':'✗')+' '+c.n+'</div>';
    }).join('')+'</div>';

    // DECISION
    html+='<div class="dec '+dec.cls+'" id="dec_'+sym+'"><div class="dec-lbl">'+dec.lbl+'</div><div class="dec-txt">'+dec.txt+'</div></div>';

    // NOTE
    html+='<div class="tc-note">'+t.note+'</div>';
    html+='</div>';
  });

  document.getElementById('tlist').innerHTML=html;
  updateGlobal();
}

function onManual(sym){
  var t=TK.find(function(x){return x.sym===sym;});
  if(!t) return;
  var s9=parseFloat(document.getElementById('mi_sma9_'+sym).value);
  var m2=parseFloat(document.getElementById('mi_ma20_'+sym).value);
  var m5=parseFloat(document.getElementById('mi_ma50_'+sym).value);
  var rs=parseFloat(document.getElementById('mi_rsi_'+sym).value);
  if(s9>0) t.sma9=s9;
  if(m2>0) t.ma20=m2;
  if(m5>0) t.ma50=m5;
  if(rs>0) t.rsi=rs;
  // Infer trend
  if(t.price>0&&t.ma20>0){
    if(t.price>t.ma20&&(t.sma9<=0||t.sma9>t.ma20)) t.trend='alcista';
    else if(t.price<t.ma20) t.trend='bajista';
    else t.trend='lateral';
  }
  t.maAuto=false;
  // Re-render just this card's MA section
  var sc=score(t), col=scoreColor(sc), dec=decision(t,sc);
  var card=document.getElementById('tc_'+sym);
  if(card) card.className='tc '+scoreClass(sc);
  var ms=document.getElementById('ms_'+sym);
  var mb=document.getElementById('mb_'+sym);
  var fg=sc>=75?'linear-gradient(90deg,var(--g),#00ffb0)':sc>=50?'linear-gradient(90deg,var(--y),#ffd000)':sc>=30?'linear-gradient(90deg,var(--txt2),#6070a0)':'linear-gradient(90deg,var(--r),#ff7090)';
  if(ms){ms.textContent=sc+'/100';ms.style.color=col;}
  if(mb){mb.style.width=sc+'%';mb.style.background=fg;}
  // Update MA boxes
  [['sma9',t.sma9],['ma20',t.ma20],['ma50',t.ma50]].forEach(function(m){
    var el=document.getElementById(m[0]+'v_'+sym);
    if(!el) return;
    var above=t.price>0&&m[1]>0&&t.price>m[1];
    el.textContent=m[1]>0?fp(m[1]):'—';
    el.style.color=m[1]>0?(above?'var(--g)':'var(--r)'):'var(--txt3)';
  });
  var decEl=document.getElementById('dec_'+sym);
  if(decEl){decEl.className='dec '+dec.cls;var dl=decEl.querySelector('.dec-lbl');var dt=decEl.querySelector('.dec-txt');if(dl)dl.textContent=dec.lbl;if(dt)dt.textContent=dec.txt;}
  updateGlobal();
}


  var p=t.price;
  var sym=t.sym;

  // PNL vs BE
  var pnl=p>0&&t.be>0?(p/t.be-1)*100:null;
  var pnlCol=pnl===null?'var(--txt3)':pnl>=0?'var(--g)':'var(--r)';
  var pr=document.getElementById('pr_'+sym);
  var pnlEl=document.getElementById('pnl_'+sym);
  if(pr) pr.textContent=p>0?fp(p):'—';
  if(pnlEl){
    pnlEl.textContent=pnl===null?'—':(pnl>=0?'🟢 +':'🔴 ')+pnl.toFixed(1)+'% vs BE';
    pnlEl.style.color=pnlCol;
  }

  // TP1 progress bar — KEY FIX
  if(p>0&&t.tp1>0){
    var tp1Pct=Math.min(100,(p/t.tp1)*100);
    var tp1Dist=t.tp1>p?((t.tp1/p-1)*100):0;
    var tp1Col=tp1Pct>=80?'var(--g)':tp1Pct>=50?'var(--y)':'var(--r)';
    var tp1Txt=tp1Pct>=100?'✅ LISTO':'falta +'+tp1Dist.toFixed(1)+'%';

    var fillEl=document.getElementById('tp1fill_'+sym);
    var valEl=document.getElementById('tp1val_'+sym);
    var priceEl=document.getElementById('tp1price_'+sym);

    if(fillEl){fillEl.style.width=tp1Pct.toFixed(1)+'%';fillEl.style.background=tp1Col;}
    if(valEl){valEl.textContent=tp1Pct.toFixed(0)+'% — '+tp1Txt;valEl.style.color=tp1Col;}
    if(priceEl) priceEl.textContent=fp(p);
  }
}

function refreshAll(){
  TK.forEach(function(t){
    var sc=score(t), col=scoreColor(sc), dec=decision(t,sc);
    var card=document.getElementById('tc_'+t.sym);
    if(card) card.className='tc '+scoreClass(sc);
    var mb=document.getElementById('mb_'+t.sym);
    var ms=document.getElementById('ms_'+t.sym);
    var fg=sc>=75?'linear-gradient(90deg,var(--g),#00ffb0)':sc>=50?'linear-gradient(90deg,var(--y),#ffd000)':sc>=30?'linear-gradient(90deg,var(--txt2),#6070a0)':'linear-gradient(90deg,var(--r),#ff7090)';
    if(mb){mb.style.width=sc+'%';mb.style.background=fg;}
    if(ms){ms.textContent=sc+'/100';ms.style.color=col;}
    var decEl=document.getElementById('dec_'+t.sym);
    if(decEl){decEl.className='dec '+dec.cls;var dl=decEl.querySelector('.dec-lbl');var dt=decEl.querySelector('.dec-txt');if(dl)dl.textContent=dec.lbl;if(dt)dt.textContent=dec.txt;}
    updatePriceDisplay(t);
  });
  updateGlobal();
}

function updateGlobal(){
  var avg=Math.round(TK.reduce(function(s,t){return s+score(t);},0)/TK.length);
  var gs=document.getElementById('gScore');
  if(gs){gs.textContent=avg;gs.style.color=scoreColor(avg);}
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function setStatus(type, txt){
  var b=document.getElementById('statusBar');
  if(!type){b.className='status-bar';return;}
  b.className='status-bar '+type;
  b.textContent=txt;
}

function setPill(id, type, html){
  var p=document.getElementById(id);
  if(!p) return;
  p.className='pill '+type;
  p.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════════════════
function saveDay(){
  saveLocal();
  var day={
    date:new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short',year:'2-digit'}),
    _raw:new Date().toDateString(),
    tokens:TK.map(function(t){
      var sc=score(t);
      return{sym:t.sym,price:t.price,rsi:t.rsi,score:sc,
             dec:decision(t,sc).cls,ma20:t.ma20,sma9:t.sma9,ma50:t.ma50,volDia:t.volDia,trend:t.trend};
    })
  };
  var hist=getHist().filter(function(h){return h._raw!==day._raw;});
  hist.unshift(day);
  if(hist.length>30) hist=hist.slice(0,30);
  setHist(hist);
  var ok=document.getElementById('saveOk');
  ok.style.display='block';
  setTimeout(function(){ok.style.display='none';},2000);
}

// ═══════════════════════════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════════════════════════
function renderSummary(){
  var data=TK.map(function(t){return{t:t,sc:score(t),dec:decision(t,score(t))};});
  var avg=Math.round(data.reduce(function(s,d){return s+d.sc;},0)/data.length);
  var sorted=data.slice().sort(function(a,b){return b.sc-a.sc;});
  var maxSc=sorted[0].sc;
  var scoreEl=document.getElementById('sumScore');
  var subEl=document.getElementById('sumSub');
  if(scoreEl){scoreEl.textContent=avg;scoreEl.style.color=scoreColor(avg);}
  if(subEl) subEl.textContent=avg>=70?'Cartera en momentum alcista — preparar TPs':avg>=50?'Momentum moderado — mantener y esperar catalizadores':avg>=35?'Momento de espera — ciclo no activo':'Revisión recomendada';
  var decCols={extend:'var(--g)',hold:'var(--y)',wait:'var(--txt3)',danger:'var(--r)'};
  var decLbls={extend:'EXTENDER',hold:'MANTENER',wait:'ESPERAR',danger:'REVISAR'};
  document.getElementById('rankList').innerHTML=sorted.map(function(d,i){
    var t=d.t, bw=maxSc>0?Math.round(d.sc/maxSc*100):0, dc=decCols[d.dec.cls];
    return '<div class="rank-row">'
      +'<div class="rr-n">#'+(i+1)+'</div>'
      +'<div class="rr-sym" style="color:'+t.color+'">'+t.sym+'</div>'
      +'<div class="rr-bar"><div class="rr-fill" style="width:'+bw+'%;background:'+t.color+'"></div></div>'
      +'<div class="rr-score" style="color:'+scoreColor(d.sc)+'">'+d.sc+'</div>'
      +'<div class="rr-badge" style="background:'+dc+'18;color:'+dc+';border:1px solid '+dc+'30">'+decLbls[d.dec.cls]+'</div>'
      +'</div>';
  }).join('');

  var tp1s=data.slice().sort(function(a,b){
    var pA=a.t.price&&a.t.tp1?a.t.price/a.t.tp1:0;
    var pB=b.t.price&&b.t.tp1?b.t.price/b.t.tp1:0;
    return pB-pA;
  });
  document.getElementById('tp1Rank').innerHTML=tp1s.map(function(d,i){
    var t=d.t, pct=t.price&&t.tp1?Math.min(100,(t.price/t.tp1)*100):0;
    var dist=t.price&&t.tp1&&t.tp1>t.price?((t.tp1/t.price-1)*100).toFixed(1):0;
    var tc=pct>=80?'var(--g)':pct>=50?'var(--y)':'var(--r)';
    return '<div class="tp1-rank-row">'
      +'<span style="font-size:10px;font-weight:900;color:var(--txt3);width:16px">'+(i+1)+'</span>'
      +'<span style="font-size:12px;font-weight:900;color:'+t.color+';width:36px">'+t.sym+'</span>'
      +'<div style="flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct.toFixed(0)+'%;background:'+tc+';border-radius:3px"></div></div>'
      +'<span style="font-size:9px;font-weight:700;font-family:Space Mono,monospace;color:'+tc+';width:34px;text-align:right">'+pct.toFixed(0)+'%</span>'
      +'<span style="font-size:9px;color:var(--txt3);font-family:Space Mono,monospace;width:72px;text-align:right">'+(pct>=100?'✅ LISTO':'falta +'+dist+'%')+'</span>'
      +'</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════════
function renderHist(){
  var hist=getHist();
  if(!hist.length){document.getElementById('histWrap').innerHTML='<div class="hist-empty">Sin historial todavía.<br>Guarda datos diariamente.</div>';return;}
  var decCols={extend:'var(--g)',hold:'var(--y)',wait:'var(--txt3)',danger:'var(--r)'};
  var decLbls={extend:'↑ EXT',hold:'→ MAN',wait:'⏳ ESP',danger:'⚠ REV'};
  document.getElementById('histWrap').innerHTML=hist.map(function(h){
    var avg=h.tokens?Math.round(h.tokens.reduce(function(s,td){return s+(td.score||0);},0)/h.tokens.length):0;
    var rows=(h.tokens||[]).map(function(td){
      var t=TK.find(function(x){return x.sym===td.sym;});
      var c=t?t.color:'#888';
      var sc=td.score||0;
      var dc=decCols[td.dec]||'var(--txt3)';
      var pnl=td.price&&t?(td.price/t.be-1)*100:null;
      var pc=pnl!==null?(pnl>=0?'var(--g)':'var(--r)'):'var(--txt2)';
      return '<div class="hday-row">'
        +'<div class="hr-sym" style="color:'+c+'">'+td.sym+'</div>'
        +'<div class="hr-price" style="color:'+pc+'">'+fp(td.price)+'</div>'
        +'<div class="hr-rsi">RSI '+( td.rsi||'—')+'</div>'
        +'<div class="hr-ma20">MA20 '+(td.ma20?fp(td.ma20):'—')+'</div>'
        +'<div class="hr-score" style="color:'+(sc>=70?'var(--g)':sc>=45?'var(--y)':'var(--txt3)')+'">'+sc+'/100</div>'
        +'<div class="hr-dec" style="background:'+dc+'18;color:'+dc+'">'+decLbls[td.dec]+'</div>'
        +'</div>';
    }).join('');
    return '<div class="hday"><div class="hday-hdr"><span class="hday-hdr-date">'+h.date+'</span><span class="hday-hdr-avg" style="color:'+scoreColor(avg)+'">Avg '+avg+'/100</span></div>'+rows+'</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════
function goTab(n){
  ['tokens','summary','hist'].forEach(function(t){
    document.getElementById('view-'+t).classList.toggle('active',t===n);
    document.getElementById('tab-'+t).classList.toggle('active',t===n);
  });
  if(n==='summary') renderSummary();
  if(n==='hist')    renderHist();
}
