<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Token Intelligence</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Tokens">
<meta name="theme-color" content="#08090d">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090d;--bg2:#0d0f16;--bg3:#12151f;--bg4:#181c28;
  --border:#1e2433;--border2:#252b3d;
  --txt:#e8eaf2;--txt2:#9098b4;--txt3:#4a5270;
  --g:#00e8a0;--gbg:rgba(0,232,160,.08);--gbdr:rgba(0,232,160,.22);
  --r:#ff4060;--rbg:rgba(255,64,96,.08);--rbdr:rgba(255,64,96,.22);
  --y:#ffb800;--ybg:rgba(255,184,0,.08);--ybdr:rgba(255,184,0,.22);
  --b:#4080ff;
}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:32px}
.mono{font-family:'Space Mono',monospace}

.hdr{padding:18px 16px 12px;border-bottom:1px solid var(--border);background:rgba(8,9,13,.96);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.hdr-brand{font-size:9px;font-weight:700;letter-spacing:4px;color:var(--txt3);margin-bottom:4px}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:20px;font-weight:800}
.hdr-date{font-size:10px;color:var(--txt3);margin-top:2px}
.global-score{font-size:28px;font-weight:800;font-family:'Space Mono',monospace}

.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 18px;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border:none;background:transparent;color:var(--txt3);font-family:'Syne',sans-serif;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--txt);border-bottom-color:var(--b)}
.view{display:none}.view.active{display:block}

/* TOKEN CARDS */
.tlist{display:flex;flex-direction:column;gap:10px;padding:14px 14px 4px}
.tc{border-radius:12px;border:1px solid var(--border2);background:var(--bg2);overflow:hidden;transition:border-color .3s}
.tc.hot{border-color:var(--gbdr)}.tc.warn{border-color:var(--ybdr)}.tc.cold{border-color:var(--border2)}.tc.danger{border-color:var(--rbdr)}
.tc-stripe{height:3px}
.tc-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.tc-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.tc-info{flex:1;min-width:0}
.tc-sym{font-size:15px;font-weight:800;letter-spacing:.3px}
.tc-phase{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--txt3);margin-top:2px}
.tc-right{text-align:right;flex-shrink:0}
.tc-price{font-size:16px;font-weight:700;font-family:'Space Mono',monospace}
.tc-be{font-size:9px;color:var(--txt3);margin-top:2px}
.tc-pnl{font-size:10px;font-weight:700;margin-top:3px}

/* Momentum */
.mom{padding:0 14px 8px}
.mom-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mom-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3)}
.mom-val{font-size:11px;font-weight:700;font-family:'Space Mono',monospace}
.mom-track{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.mom-bar{height:100%;border-radius:3px;transition:width .6s}

/* Catalysts */
.cats{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 8px}
.cat{font-size:8px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:.5px;display:flex;align-items:center;gap:3px}
.cat.on{background:var(--gbg);color:var(--g);border:1px solid var(--gbdr)}
.cat.pend{background:var(--ybg);color:var(--y);border:1px solid var(--ybdr)}
.cat.off{background:var(--bg4);color:var(--txt3);border:1px solid var(--border2);opacity:.6}

/* Decision */
.dec{margin:0 14px 10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3)}
.dec.extend{border-color:var(--gbdr);background:var(--gbg)}
.dec.hold{border-color:var(--ybdr);background:var(--ybg)}
.dec.wait{border-color:var(--border2)}
.dec.danger{border-color:var(--rbdr);background:var(--rbg)}
.dec-lbl{font-size:8px;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.dec.extend .dec-lbl{color:var(--g)}.dec.hold .dec-lbl{color:var(--y)}.dec.wait .dec-lbl{color:var(--txt3)}.dec.danger .dec-lbl{color:var(--r)}
.dec-txt{font-size:11px;color:var(--txt2);line-height:1.6}

/* Inputs */
.inp-sect{padding:0 14px 6px}
.inp-lbl-main{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3);margin-bottom:6px}
.inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.inp-box{background:var(--bg4);border:1px solid var(--border2);border-radius:7px;padding:7px 10px}
.inp-box-lbl{font-size:7px;font-weight:700;letter-spacing:1.5px;color:var(--txt3);display:block;margin-bottom:4px}
.inp-f{width:100%;background:transparent;border:none;color:var(--txt);font-size:13px;font-weight:700;font-family:'Space Mono',monospace;outline:none;-webkit-appearance:none}
.inp-f::placeholder{color:var(--txt3)}
.inp-sel{width:100%;background:transparent;border:none;color:var(--txt);font-size:12px;font-weight:700;font-family:'Syne',sans-serif;outline:none;-webkit-appearance:none;cursor:pointer}
.inp-sel option{background:var(--bg3);color:var(--txt)}

/* Note */
.tc-note{padding:8px 14px;font-size:10px;color:var(--txt3);line-height:1.6;border-top:1px solid var(--border);margin-top:2px}

/* Save */
.save-wrap{padding:10px 14px 16px}
.save-btn{width:100%;padding:12px;background:var(--b);border:none;border-radius:9px;color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:'Syne',sans-serif}
.save-ok{display:none;text-align:center;font-size:10px;color:var(--g);padding:6px;letter-spacing:1px}

/* SUMMARY */
.sum-hero{margin:14px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:18px}
.sh-lbl{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--txt3);margin-bottom:6px}
.sh-score{font-size:44px;font-weight:800;font-family:'Space Mono',monospace;line-height:1}
.sh-sub{font-size:11px;color:var(--txt3);margin-top:6px;line-height:1.5}
.rank-list{display:flex;flex-direction:column;gap:7px;padding:0 14px 14px}
.rank-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 12px}
.rr-n{font-size:11px;color:var(--txt3);font-family:'Space Mono',monospace;width:18px}
.rr-sym{font-size:13px;font-weight:800;width:38px}
.rr-bar{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.rr-fill{height:100%;border-radius:3px}
.rr-score{font-size:11px;font-weight:700;font-family:'Space Mono',monospace;width:30px;text-align:right}
.rr-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0}

/* HISTORY */
.hist-empty{text-align:center;padding:40px 20px;color:var(--txt3);font-size:12px;line-height:2}
.hday{margin:0 14px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.hday-hdr{padding:8px 12px;background:var(--bg3);font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3);border-bottom:1px solid var(--border)}
.hday-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border)}
.hday-row:last-child{border:none}
.hr-sym{font-size:11px;font-weight:800;width:34px}
.hr-price{font-size:10px;font-family:'Space Mono',monospace;width:66px;color:var(--txt2)}
.hr-score{font-size:10px;font-weight:700;font-family:'Space Mono',monospace;flex:1;text-align:right}
.hr-dec{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.tc{animation:fadeIn .25s ease both}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-brand">◈ TOKEN INTELLIGENCE</div>
  <div class="hdr-row">
    <div>
      <div class="hdr-title">Análisis de Momento</div>
      <div class="hdr-date" id="hdate"></div>
    </div>
    <div class="global-score" id="gScore" style="color:var(--y)">—</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-tokens" onclick="goTab('tokens')">TOKENS</button>
  <button class="tab" id="tab-summary" onclick="goTab('summary')">RESUMEN</button>
  <button class="tab" id="tab-hist" onclick="goTab('hist')">HISTORIAL</button>
</div>

<div class="view active" id="view-tokens">
  <div class="tlist" id="tlist"></div>
  <div class="save-wrap">
    <button class="save-btn" onclick="saveDay()">💾  GUARDAR DÍA</button>
    <div class="save-ok" id="saveOk">✓ Datos guardados</div>
  </div>
</div>

<div class="view" id="view-summary">
  <div class="sum-hero">
    <div class="sh-lbl">MOMENTUM GLOBAL</div>
    <div class="sh-score" id="sumScore" style="color:var(--y)">—</div>
    <div class="sh-sub" id="sumSub">—</div>
  </div>
  <div style="font-size:8px;font-weight:700;letter-spacing:3px;color:var(--txt3);padding:12px 14px 6px">RANKING</div>
  <div class="rank-list" id="rankList"></div>
</div>

<div class="view" id="view-hist">
  <div id="histWrap"><div class="hist-empty">Sin historial.<br>Guarda datos diariamente<br>para ver la evolución.</div></div>
</div>

<script>
// ── TOKENS DATA ───────────────────────────────────────────────
var TK = [
  {sym:'BTC', name:'Bitcoin',    color:'#f7931a', be:88402,   narr:70, phase:'FASE 1 TARDÍA',
   cats:[{n:'Reserva estratégica EEUU',s:1},{n:'ETF AUM $60B',s:1},{n:'Warsh Fed dovish',s:null},{n:'Rompe $82.4K',s:0}],
   note:'Consolida $75-80K. Necesita romper 200-day MA $82.4K para activar el ciclo. Kevin Warsh (nuevo Fed) puede ser catalizador dovish.',
   price:75489, rsi:42, trend:'bajista', vol:'bajo'},

  {sym:'ETH', name:'Ethereum',   color:'#627eea', be:2862,    narr:52, phase:'MÁS REZAGADO',
   cats:[{n:'ETH ETF staking yield',s:null},{n:'EigenLayer creciendo',s:1},{n:'ETH/BTC gira >0.032',s:0},{n:'CLARITY Act commodity',s:null}],
   note:'ETH/BTC en mínimos del ciclo (0.027). El más débil de la cartera. Necesita dominancia BTC bajo 58% para despertar.',
   price:2064, rsi:38, trend:'bajista', vol:'bajo'},

  {sym:'SOL', name:'Solana',     color:'#9945ff', be:116.52,  narr:72, phase:'ESPERANDO FASE 2',
   cats:[{n:'USDF Coinbase en Solana',s:1},{n:'Alpenglow mainnet',s:null},{n:'ETF inflows continuos',s:1},{n:'Altseason Index >50',s:0}],
   note:'Ecosistema más activo. USDF stablecoin lanzada. Alpenglow upgrade en testnet. Sube con la marea — necesita altseason general.',
   price:84.30, rsi:40, trend:'bajista', vol:'bajo'},

  {sym:'LINK', name:'Chainlink', color:'#375bd2', be:10.19,   narr:85, phase:'CATALIZADORES PENDIENTES',
   cats:[{n:'SWIFT CCIP live junio',s:1},{n:'DTCC AppChain Q4 2026',s:1},{n:'CLARITY Act firmada',s:0},{n:'Fed dovish bajada tipos',s:null}],
   note:'Fundamentos institucionales excepcionales: DTCC $114T, SWIFT, JPMorgan, Mastercard. Precio dormido esperando regulación. Divergencia uso/precio histórica.',
   price:9.42, rsi:42, trend:'lateral', vol:'bajo'},

  {sym:'XRP', name:'Ripple',     color:'#00aae4', be:1.94,    narr:82, phase:'BLOQUEADO — ESPERA LEY',
   cats:[{n:'SWIFT 25+ bancos junio',s:1},{n:'Japón FIEA parlamento',s:null},{n:'CLARITY Act firmada',s:0},{n:'SBI ETF Tokio',s:null}],
   note:'$21.7B japoneses en XRP. SWIFT conectado vía Thunes-ODL. RLUSD live en Japón. Token más binario: CLARITY Act lo desbloquea todo.',
   price:1.33, rsi:40, trend:'bajista', vol:'bajo'},

  {sym:'HBAR', name:'Hedera',    color:'#8e9494', be:0.09904, narr:80, phase:'ENTERPRISE ACTIVO',
   cats:[{n:'Georgia registro inmobiliario',s:1},{n:'15 ETFs SEC revisión',s:1},{n:'CLARITY Act commodity',s:0},{n:'HederaCon 2026',s:null}],
   note:'Google, IBM, Boeing, LG en Governing Council. Georgia migra registro nacional. Solo -11% bajo BE. Muy cerca de entrar en verde.',
   price:0.08794, rsi:43, trend:'lateral', vol:'bajo'},

  {sym:'AAVE', name:'Aave',      color:'#b6509e', be:136.07,  narr:58, phase:'ANTI-YIELDS',
   cats:[{n:'Warsh Fed señal dovish',s:null},{n:'CLARITY Act DeFi legal',s:0},{n:'Yields bono <4%',s:0},{n:'Aave v4 lanzamiento',s:null}],
   note:'Correlación inversa con yields de bonos. Con bonos al 5% nadie usa DeFi. Warsh (nuevo Fed) puede ser el detonador. El más paciente.',
   price:85.94, rsi:36, trend:'bajista', vol:'bajo'},

  {sym:'NEAR', name:'NEAR Protocol', color:'#00c08b', be:1.37, narr:92, phase:'MOMENTUM PROPIO AI',
   cats:[{n:'NEARCON 2026 AI infra',s:1},{n:'Confidential GPU Marketplace',s:1},{n:'Bridge Solana/TON activo',s:1},{n:'RSI no sobrecomprado',s:1}],
   note:'Único token que sube mientras todo cae. +53% sobre BE. Narrativa AI completamente independiente del ciclo macro. Momentum acelerándose.',
   price:2.10, rsi:61, trend:'alcista', vol:'alto'},

  {sym:'GRT', name:'The Graph',  color:'#6747ed', be:0.03421, narr:74, phase:'DORMIDO — FASE 3',
   cats:[{n:'Horizon mainnet 2026',s:1},{n:'Narrativa AI datos',s:1},{n:'Altseason Index >65',s:0},{n:'Retail entrada masiva',s:0}],
   note:'Horizon mainnet en 2026. Indexa datos para apps AI. 11.94% APY acumula tokens. De $0.10 a $2.88 en 2021 en altseason — patrón pendiente.',
   price:0.0258, rsi:44, trend:'lateral', vol:'normal'},

  {sym:'DOT', name:'Polkadot',   color:'#e6007a', be:1.53,    narr:55, phase:'SUBE CON LA MAREA',
   cats:[{n:'JAM upgrade lanzamiento',s:null},{n:'Staking 5.45% APY',s:1},{n:'Altseason confirmada',s:0},{n:'Nuevas parachains',s:null}],
   note:'JAM upgrade como narrativa renovada. 5.45% APY de suelo natural. Sin catalizadores propios — sube cuando la altseason general llega.',
   price:1.26, rsi:39, trend:'bajista', vol:'bajo'}
];

// ── STORAGE ───────────────────────────────────────────────────
function getSaved(){try{return JSON.parse(localStorage.getItem('ti3_saved')||'{}')}catch(e){return{}}}
function setSaved(d){try{localStorage.setItem('ti3_saved',JSON.stringify(d))}catch(e){}}
function getHist(){try{return JSON.parse(localStorage.getItem('ti3_hist')||'[]')}catch(e){return[]}}
function setHist(h){try{localStorage.setItem('ti3_hist',JSON.stringify(h))}catch(e){}}

// Load saved into TK
var saved=getSaved();
TK.forEach(function(t){
  if(saved[t.sym]){
    if(saved[t.sym].price!==undefined)t.price=saved[t.sym].price;
    if(saved[t.sym].rsi!==undefined)t.rsi=saved[t.sym].rsi;
    if(saved[t.sym].trend)t.trend=saved[t.sym].trend;
    if(saved[t.sym].vol)t.vol=saved[t.sym].vol;
  }
});

// ── SCORING ───────────────────────────────────────────────────
function score(t){
  var s=0;
  s+=t.narr*0.28;
  var on=t.cats.filter(function(c){return c.s===1;}).length;
  var pend=t.cats.filter(function(c){return c.s===null;}).length;
  s+=(on/t.cats.length)*20+(pend/t.cats.length)*4;
  var rsi=parseFloat(t.rsi)||50;
  s+=rsi>=40&&rsi<=70?20:rsi>=30&&rsi<40?14:rsi<30?9:rsi>80?5:12;
  s+=t.trend==='alcista'?15:t.trend==='lateral'?8:2;
  s+=t.vol==='alto'?10:t.vol==='normal'?6:2;
  return Math.min(100,Math.round(s));
}

function scoreColor(s){return s>=75?'var(--g)':s>=50?'var(--y)':s>=30?'var(--txt2)':'var(--r)';}
function scoreClass(s){return s>=75?'hot':s>=50?'warn':s>=30?'cold':'danger';}

function decision(t,s){
  var p=parseFloat(t.price)||0;
  var ratio=p>0&&t.be>0?p/t.be:0;
  if(s>=80&&ratio>=0.85) return {cls:'extend',lbl:'⬆ EXTENDER TP',txt:'Momentum excepcional y precio cerca del BE. Los catalizadores y la trayectoria sugieren que el token puede superar los TPs actuales. Considera elevar el TP1 un 15-20% o retrasar la ejecución del primer 40%.'};
  if(s>=80) return {cls:'hold',lbl:'◉ ALTA CONVICCIÓN — MANTENER',txt:'Momentum muy fuerte pero precio aún lejos del BE. Los catalizadores activos darán el empuje. Mantener posición completa en staking.'};
  if(s>=55) return {cls:'hold',lbl:'→ MANTENER TPs ACTUALES',txt:'Momentum moderado. Los catalizadores están en proceso. El plan 40/30/30% es correcto tal cual. Ejecutar sin dudar cuando llegue el TP1.'};
  if(s>=30) return {cls:'wait',lbl:'⏳ ESPERAR CATALIZADORES',txt:'Momentum bajo. Necesita más catalizadores activos antes de moverse significativamente. Mantener en staking y esperar.'};
  return {cls:'danger',lbl:'⚠ REVISIÓN ESTRATÉGICA',txt:'Múltiples señales débiles. Si el momentum sigue deteriorándose y los catalizadores se bloquean, revisar el plan. No actuar impulsivamente.'};
}

// ── RENDER TOKENS ─────────────────────────────────────────────
function renderAll(){
  var html='';
  TK.forEach(function(t,i){
    var sc=score(t);
    var col=scoreColor(sc);
    var cls=scoreClass(sc);
    var dec=decision(t,sc);
    var p=parseFloat(t.price)||0;
    var pnl=p>0&&t.be>0?(p/t.be-1)*100:null;
    var pnlTxt=pnl!==null?(pnl>=0?'🟢 +'+pnl.toFixed(1)+'% vs BE':'🔴 '+pnl.toFixed(1)+'% del BE'):'Sin precio';
    var pnlCol=pnl!==null?(pnl>=0?'var(--g)':'var(--r)'):'var(--txt3)';
    var pFmt=p===0?'$—':p>=1000?'$'+Math.round(p).toLocaleString('en-US'):p>=1?'$'+p.toFixed(2):'$'+p.toFixed(5);
    var beFmt=t.be>=1000?'$'+Math.round(t.be).toLocaleString('en-US'):t.be>=1?'$'+t.be.toFixed(2):'$'+t.be.toFixed(4);
    var fillGrad=sc>=75?'linear-gradient(90deg,var(--g),#00ffb0)':sc>=50?'linear-gradient(90deg,var(--y),#ffd000)':sc>=30?'linear-gradient(90deg,var(--txt2),#7080a0)':'linear-gradient(90deg,var(--r),#ff8090)';

    html+='<div class="tc '+cls+'" id="tc_'+t.sym+'" style="animation-delay:'+(i*.03)+'s">';
    html+='<div class="tc-stripe" style="background:'+t.color+'"></div>';

    // HEAD
    html+='<div class="tc-head">';
    html+='<div class="tc-ico" style="background:'+t.color+'18;border:1px solid '+t.color+'33;color:'+t.color+'">'+t.sym.slice(0,3)+'</div>';
    html+='<div class="tc-info"><div class="tc-sym" style="color:'+t.color+'">'+t.sym+'</div><div class="tc-phase">'+t.phase+'</div></div>';
    html+='<div class="tc-right"><div class="tc-price">'+pFmt+'</div><div class="tc-be">BE '+beFmt+'</div><div class="tc-pnl" style="color:'+pnlCol+'">'+pnlTxt+'</div></div>';
    html+='</div>';

    // MOMENTUM BAR
    html+='<div class="mom">';
    html+='<div class="mom-top"><span class="mom-lbl">MOMENTUM</span><span class="mom-val" style="color:'+col+'">'+sc+'/100</span></div>';
    html+='<div class="mom-track"><div class="mom-bar" style="width:'+sc+'%;background:'+fillGrad+'"></div></div>';
    html+='</div>';

    // CATALYSTS
    html+='<div class="cats">';
    t.cats.forEach(function(c){
      var cls2=c.s===1?'on':c.s===null?'pend':'off';
      var ico=c.s===1?'✓':c.s===null?'⏳':'✗';
      html+='<div class="cat '+cls2+'">'+ico+' '+c.n+'</div>';
    });
    html+='</div>';

    // DECISION
    html+='<div class="dec '+dec.cls+'"><div class="dec-lbl">'+dec.lbl+'</div><div class="dec-txt">'+dec.txt+'</div></div>';

    // NOTE
    html+='<div class="tc-note">'+t.note+'</div>';

    // INPUTS — no oninput re-render, use change events stored silently
    html+='<div class="inp-sect"><div class="inp-lbl-main">ACTUALIZAR</div>';
    html+='<div class="inp-grid">';
    html+='<div class="inp-box"><label class="inp-box-lbl">PRECIO HOY</label><input class="inp-f" id="p_'+t.sym+'" type="number" step="any" placeholder="'+(t.be<1?'0.000':'0')+'" value="'+(p||'')+'"></div>';
    html+='<div class="inp-box"><label class="inp-box-lbl">RSI TRADINGVIEW</label><input class="inp-f" id="r_'+t.sym+'" type="number" step="1" min="0" max="100" placeholder="50" value="'+(t.rsi||'')+'"></div>';
    html+='<div class="inp-box"><label class="inp-box-lbl">TENDENCIA</label><select class="inp-sel" id="t_'+t.sym+'"><option value="alcista"'+(t.trend==='alcista'?' selected':'')+'>⬆ Alcista</option><option value="lateral"'+(t.trend==='lateral'?' selected':'')+'>→ Lateral</option><option value="bajista"'+(t.trend==='bajista'?' selected':'')+'>⬇ Bajista</option></select></div>';
    html+='<div class="inp-box"><label class="inp-box-lbl">VOLUMEN</label><select class="inp-sel" id="v_'+t.sym+'"><option value="alto"'+(t.vol==='alto'?' selected':'')+'>⬆ Alto</option><option value="normal"'+(t.vol==='normal'?' selected':'')+'>→ Normal</option><option value="bajo"'+(t.vol==='bajo'?' selected':'')+'>⬇ Bajo</option></select></div>';
    html+='</div></div>';
    html+='</div>';
  });
  document.getElementById('tlist').innerHTML=html;
  updateGlobalScore();
}

// Read inputs without re-rendering
function readInputs(){
  TK.forEach(function(t){
    var pi=document.getElementById('p_'+t.sym);
    var ri=document.getElementById('r_'+t.sym);
    var ti=document.getElementById('t_'+t.sym);
    var vi=document.getElementById('v_'+t.sym);
    if(pi)t.price=parseFloat(pi.value)||null;
    if(ri)t.rsi=parseFloat(ri.value)||null;
    if(ti)t.trend=ti.value;
    if(vi)t.vol=vi.value;
  });
}

function updateGlobalScore(){
  var scores=TK.map(function(t){return score(t);});
  var avg=Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length);
  var col=scoreColor(avg);
  var gs=document.getElementById('gScore');
  if(gs){gs.textContent=avg;gs.style.color=col;}
}

// ── SUMMARY ───────────────────────────────────────────────────
function renderSummary(){
  readInputs();
  var data=TK.map(function(t){return{t:t,sc:score(t),dec:decision(t,score(t))};});
  var avg=Math.round(data.reduce(function(a,b){return a+b.sc;},0)/data.length);
  var sorted=data.slice().sort(function(a,b){return b.sc-a.sc;});
  var maxSc=sorted[0].sc;

  var col=scoreColor(avg);
  var el=document.getElementById('sumScore');if(el){el.textContent=avg;el.style.color=col;}
  var sub=avg>=70?'Cartera en momentum alcista — preparar ejecución de TPs próximos':avg>=50?'Momentum moderado — mantener posiciones y esperar catalizadores':avg>=35?'Momento de espera — ciclo no activo todavía para la mayoría':'Revisión recomendada — múltiples señales negativas';
  var sEl=document.getElementById('sumSub');if(sEl)sEl.textContent=sub;

  var decCols={extend:'var(--g)',hold:'var(--y)',wait:'var(--txt3)',danger:'var(--r)'};
  var decLbls={extend:'EXTENDER',hold:'MANTENER',wait:'ESPERAR',danger:'REVISAR'};
  var html=sorted.map(function(d,i){
    var t=d.t;
    var bw=maxSc>0?Math.round(d.sc/maxSc*100):0;
    var dc=decCols[d.dec.cls];
    return '<div class="rank-row">'
      +'<div class="rr-n">#'+(i+1)+'</div>'
      +'<div class="rr-sym" style="color:'+t.color+'">'+t.sym+'</div>'
      +'<div class="rr-bar"><div class="rr-fill" style="width:'+bw+'%;background:'+t.color+'"></div></div>'
      +'<div class="rr-score" style="color:'+scoreColor(d.sc)+'">'+d.sc+'</div>'
      +'<div class="rr-badge" style="background:'+dc+'18;color:'+dc+';border:1px solid '+dc+'33">'+decLbls[d.dec.cls]+'</div>'
      +'</div>';
  }).join('');
  var rl=document.getElementById('rankList');if(rl)rl.innerHTML=html;
}

// ── HISTORY ───────────────────────────────────────────────────
function renderHist(){
  var hist=getHist();
  if(!hist.length){document.getElementById('histWrap').innerHTML='<div class="hist-empty">Sin historial.<br>Guarda datos diariamente<br>para ver la evolución.</div>';return;}
  var decCols={extend:'var(--g)',hold:'var(--y)',wait:'var(--txt3)',danger:'var(--r)'};
  var decLbls={extend:'↑ EXT',hold:'→ MAN',wait:'⏳ ESP',danger:'⚠ REV'};
  var html=hist.map(function(h){
    var rows=(h.tokens||[]).map(function(td){
      var t=TK.filter(function(x){return x.sym===td.sym;})[0];
      var c=t?t.color:'#888';
      var sc=td.score||0;
      var dc=decCols[td.dec]||'var(--txt3)';
      var dl=decLbls[td.dec]||'—';
      var p=parseFloat(td.price)||0;
      var pFmt=p===0?'—':p>=1000?'$'+Math.round(p)+'K':p>=1?'$'+p.toFixed(2):'$'+p.toFixed(4);
      return '<div class="hday-row">'
        +'<div class="hr-sym" style="color:'+c+'">'+td.sym+'</div>'
        +'<div class="hr-price">'+pFmt+'</div>'
        +'<div class="hr-score" style="color:'+(sc>=70?'var(--g)':sc>=45?'var(--y)':'var(--txt3)')+'">'+sc+'/100</div>'
        +'<div class="hr-dec" style="background:'+dc+'18;color:'+dc+'">'+dl+'</div>'
        +'</div>';
    }).join('');
    return '<div class="hday"><div class="hday-hdr">'+h.date+'</div>'+rows+'</div>';
  }).join('');
  document.getElementById('histWrap').innerHTML=html||'<div class="hist-empty">Sin datos</div>';
}

// ── SAVE ─────────────────────────────────────────────────────
function saveDay(){
  readInputs();
  // Save current state
  var s={};
  TK.forEach(function(t){s[t.sym]={price:t.price,rsi:t.rsi,trend:t.trend,vol:t.vol};});
  setSaved(s);

  // Save to history
  var day={
    date:new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short',year:'2-digit'}),
    _raw:new Date().toDateString(),
    tokens:TK.map(function(t){
      var sc=score(t);
      return{sym:t.sym,price:t.price,rsi:t.rsi,score:sc,dec:decision(t,sc).cls};
    })
  };
  var hist=getHist().filter(function(h){return h._raw!==day._raw;});
  hist.unshift(day);
  if(hist.length>30)hist=hist.slice(0,30);
  setHist(hist);

  // Re-render cards with new scores
  renderAll();

  var ok=document.getElementById('saveOk');
  var btn=document.querySelector('.save-btn');
  ok.style.display='block';
  btn.textContent='✓ GUARDADO';
  btn.style.background='var(--g)';
  btn.style.color='var(--bg)';
  setTimeout(function(){
    ok.style.display='none';
    btn.textContent='💾  GUARDAR DÍA';
    btn.style.background='var(--b)';
    btn.style.color='#fff';
  },2200);
}

// ── NAV ───────────────────────────────────────────────────────
function goTab(n){
  ['tokens','summary','hist'].forEach(function(t){
    document.getElementById('view-'+t).classList.toggle('active',t===n);
    document.getElementById('tab-'+t).classList.toggle('active',t===n);
  });
  if(n==='summary'){readInputs();renderSummary();}
  if(n==='hist')renderHist();
}

// ── INIT ─────────────────────────────────────────────────────
document.getElementById('hdate').textContent=
  new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
renderAll();
</script>
