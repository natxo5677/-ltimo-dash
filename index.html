<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--bg2:#0c0e18;--bg3:#111420;--bg4:#161924;
  --bdr:#1a1f30;--bdr2:#222840;
  --txt:#e4e8f4;--txt2:#8892b0;--txt3:#404868;
  --g:#00e8a0;--gbg:rgba(0,232,160,.08);--gbdr:rgba(0,232,160,.22);
  --r:#ff4060;--rbg:rgba(255,64,96,.08);--rbdr:rgba(255,64,96,.22);
  --y:#ffb800;--ybg:rgba(255,184,0,.08);--ybdr:rgba(255,184,0,.22);
  --b:#4d8aff;--bbg:rgba(77,138,255,.08);--bbdr:rgba(77,138,255,.22);
}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:32px}
.mono{font-family:'Space Mono',monospace}
/* HEADER */
.hdr{padding:16px 16px 12px;border-bottom:1px solid var(--bdr);background:rgba(7,9,15,.96);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.hdr-brand{font-size:8px;font-weight:700;letter-spacing:4px;color:var(--txt3);margin-bottom:5px}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-title{font-size:19px;font-weight:900}
.hdr-date{font-size:9px;color:var(--txt3);margin-top:3px}
.hdr-right{text-align:right}
.gscore{font-size:30px;font-weight:900;font-family:'Space Mono',monospace;line-height:1}
.pills{display:flex;gap:5px;margin-top:5px;justify-content:flex-end;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px;border:1px solid var(--bdr2);background:var(--bg4);color:var(--txt3)}
.pill.on{background:var(--gbg);color:var(--g);border-color:var(--gbdr)}
.pill.warn{background:var(--ybg);color:var(--y);border-color:var(--ybdr)}
.pill.loading{background:var(--bbg);color:var(--b);border-color:var(--bbdr)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--g);animation:dp 1.8s infinite;display:inline-block}
@keyframes dp{0%{box-shadow:0 0 0 0 rgba(0,232,160,.5)}70%{box-shadow:0 0 0 5px rgba(0,232,160,0)}100%{box-shadow:0 0 0 0 rgba(0,232,160,0)}}
/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 18px;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border:none;background:transparent;color:var(--txt3);font-family:'Syne',sans-serif;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--txt);border-bottom-color:var(--b)}
.view{display:none}.view.active{display:block}
/* STATUS BAR */
.sbar{padding:8px 16px;font-size:10px;font-weight:700;text-align:center;display:none;letter-spacing:.5px}
.sbar.ok{display:block;background:var(--gbg);color:var(--g);border-bottom:1px solid var(--gbdr)}
.sbar.err{display:block;background:var(--rbg);color:var(--r);border-bottom:1px solid var(--rbdr)}
.sbar.load{display:block;background:var(--bbg);color:var(--b);border-bottom:1px solid var(--bbdr)}
/* CARD */
.tlist{display:flex;flex-direction:column;gap:10px;padding:14px}
.tc{border-radius:14px;border:1px solid var(--bdr2);background:var(--bg2);overflow:hidden;transition:border-color .3s;animation:fi .22s ease both}
.tc.hot{border-color:var(--gbdr)}.tc.warn{border-color:var(--ybdr)}.tc.cold{border-color:var(--bdr2)}.tc.danger{border-color:var(--rbdr)}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.stripe{height:3px}
/* HEAD */
.head{display:flex;align-items:center;gap:10px;padding:13px 14px 8px}
.ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.sym{font-size:16px;font-weight:900}
.phase{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--txt3);margin-top:3px;text-transform:uppercase}
.right{text-align:right;flex-shrink:0}
.price{font-size:17px;font-weight:700;font-family:'Space Mono',monospace}
.be-lbl{font-size:8px;color:var(--txt3);margin-top:2px;font-family:'Space Mono',monospace}
.pnl{font-size:10px;font-weight:700;margin-top:3px;font-family:'Space Mono',monospace}
.ltag{font-size:8px;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block;margin-top:3px;background:rgba(74,82,112,.2);color:var(--txt3)}
/* MOMENTUM */
.mom{padding:0 14px 8px}
.mom-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.mlbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3)}
.mval{font-size:12px;font-weight:700;font-family:'Space Mono',monospace}
.mtrack{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.mbar{height:100%;border-radius:3px;transition:width .7s}
/* TP1 */
.tp1s{padding:0 14px 10px}
.tp1row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tp1lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3)}
.tp1val{font-size:10px;font-weight:700;font-family:'Space Mono',monospace}
.tp1track{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;position:relative;margin-bottom:4px}
.tp1fill{height:100%;border-radius:5px;transition:width .7s}
.tp1be{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.25)}
.tp1labs{display:flex;justify-content:space-between;font-size:8px;color:var(--txt3);font-family:'Space Mono',monospace}
/* MAs */
.mas{padding:0 14px 8px}
.mas-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mas-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3)}
.mas-src{font-size:8px;font-weight:700;padding:1px 6px;border-radius:4px}
.mas-src.auto{background:var(--gbg);color:var(--g);border:1px solid var(--gbdr)}
.mas-src.none{background:var(--bg4);color:var(--txt3);border:1px solid var(--bdr2)}
.ma-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:6px}
.ma-box{background:var(--bg3);border-radius:7px;padding:8px;border:1px solid var(--bdr)}
.ma-box.above{border-color:rgba(0,232,160,.25)}.ma-box.below{border-color:rgba(255,64,96,.2)}
.ma-lbl{font-size:7px;font-weight:700;letter-spacing:1px;color:var(--txt3);margin-bottom:4px;text-transform:uppercase}
.ma-val{font-size:12px;font-weight:700;font-family:'Space Mono',monospace;margin-bottom:3px}
.ma-sig{font-size:8px;font-weight:700}
.sigs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.sig-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.3px}
/* MANUAL INPUTS */
.minp{background:var(--bg3);border-radius:8px;padding:8px 10px;border:1px solid var(--bdr)}
.minp-lbl{font-size:7px;font-weight:700;letter-spacing:1.5px;color:var(--txt3);margin-bottom:6px;text-transform:uppercase}
.minp-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px}
.minp-cell label{display:block;font-size:7px;color:var(--txt3);margin-bottom:2px;font-weight:700}
.finp{width:100%;background:var(--bg4);border:1px solid var(--bdr2);border-radius:5px;color:var(--txt);font-size:11px;font-weight:700;font-family:'Space Mono',monospace;padding:5px 6px;-webkit-appearance:none;outline:none}
/* VOL */
.vol{padding:0 14px 8px}
.vol-row{display:flex;align-items:center;gap:10px}
.vol-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3);width:62px;flex-shrink:0}
.vol-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.vol-fill{height:100%;border-radius:3px}
.vol-num{font-size:10px;font-weight:700;font-family:'Space Mono',monospace;min-width:64px;text-align:right}
/* CATS */
.cats{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 8px}
.cat{font-size:8px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.3px;display:flex;align-items:center;gap:3px}
.cat.on{background:var(--gbg);color:var(--g);border:1px solid var(--gbdr)}
.cat.pend{background:var(--ybg);color:var(--y);border:1px solid var(--ybdr)}
.cat.off{background:var(--bg4);color:var(--txt3);border:1px solid var(--bdr2);opacity:.55}
/* DECISION */
.dec{margin:0 14px 10px;padding:10px 12px;border-radius:8px;border:1px solid var(--bdr2);background:var(--bg3)}
.dec.extend{border-color:var(--gbdr);background:var(--gbg)}.dec.hold{border-color:var(--ybdr);background:var(--ybg)}
.dec.wait{border-color:var(--bdr)}.dec.danger{border-color:var(--rbdr);background:var(--rbg)}
.dec-lbl{font-size:8px;font-weight:800;letter-spacing:2px;margin-bottom:4px;text-transform:uppercase}
.dec.extend .dec-lbl{color:var(--g)}.dec.hold .dec-lbl{color:var(--y)}.dec.wait .dec-lbl{color:var(--txt3)}.dec.danger .dec-lbl{color:var(--r)}
.dec-txt{font-size:11px;color:var(--txt2);line-height:1.6}
/* NOTE */
.note{padding:8px 14px 12px;font-size:10px;color:var(--txt3);line-height:1.6;border-top:1px solid var(--bdr)}
/* BUTTONS */
.btns{padding:12px 14px 16px;display:flex;flex-direction:column;gap:8px}
.btn{padding:12px;border-radius:9px;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:'Syne',sans-serif;text-align:center;border:none}
.btn-p{background:var(--bbg);color:var(--b);border:1px solid var(--bbdr)}
.btn-m{background:var(--gbg);color:var(--g);border:1px solid var(--gbdr)}
.btn-s{background:var(--b);color:#fff}
.saveok{display:none;text-align:center;font-size:10px;color:var(--g);padding:4px;letter-spacing:1px}
/* SUMMARY */
.sum-hero{margin:14px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:18px}
.sh-lbl{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--txt3);margin-bottom:6px;text-transform:uppercase}
.sh-score{font-size:46px;font-weight:900;font-family:'Space Mono',monospace;line-height:1}
.sh-sub{font-size:11px;color:var(--txt3);margin-top:6px;line-height:1.5}
.slbl{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--txt3);padding:12px 14px 6px;text-transform:uppercase}
.rlist{display:flex;flex-direction:column;gap:6px;padding:0 14px 14px}
.rrow{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px}
.rn{font-size:10px;color:var(--txt3);font-family:'Space Mono',monospace;width:16px;flex-shrink:0}
.rsym{font-size:13px;font-weight:900;width:36px;flex-shrink:0}
.rbar{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.rfill{height:100%;border-radius:3px}
.rscore{font-size:11px;font-weight:700;font-family:'Space Mono',monospace;width:32px;text-align:right;flex-shrink:0}
.rbadge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0}
/* HISTORY */
.hempty{text-align:center;padding:40px;color:var(--txt3);font-size:12px;line-height:2}
.hday{margin:0 14px 10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.hdh{padding:8px 12px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr)}
.hdh-d{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--txt3);text-transform:uppercase}
.hdh-a{font-size:10px;font-weight:700;font-family:'Space Mono',monospace}
.hrow{display:flex;align-items:center;gap:5px;padding:7px 12px;border-bottom:1px solid var(--bdr)}
.hrow:last-child{border:none}
.hs{font-size:11px;font-weight:800;width:32px;flex-shrink:0}
.hp{font-size:9px;font-family:'Space Mono',monospace;width:58px;flex-shrink:0}
.hm{font-size:9px;font-family:'Space Mono',monospace;width:54px;color:var(--txt3);flex-shrink:0}
.hr{font-size:9px;font-family:'Space Mono',monospace;width:40px;color:var(--txt3);flex-shrink:0}
.hsc{font-size:10px;font-weight:700;font-family:'Space Mono',monospace;flex:1;text-align:right}
.hdc{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;flex-shrink:0}
</style>
</head>

// ────────────────────────────────────────────
// MATH
// ────────────────────────────────────────────
function calcSMA(arr,n){
  if(arr.length<n)return 0;
  return arr.slice(-n).reduce(function(a,b){return a+b;},0)/n;
}
function calcRSI(closes){
  if(closes.length<15)return 50;
  var g=0,l=0;
  for(var i=closes.length-14;i<closes.length;i++){
    var d=closes[i]-closes[i-1];if(d>0)g+=d;else l+=Math.abs(d);
  }
  var ag=g/14,al=l/14;if(al===0)return 99;
  return Math.min(99,Math.max(1,Math.round(100-(100/(1+ag/al)))));
}
function classifyVol(today,recent){
  if(!today||!recent.length)return'normal';
  var avg=recent.reduce(function(a,b){return a+b;},0)/recent.length;
  if(!avg)return'normal';
  var r=today/avg;return r>1.4?'alto':r<0.65?'bajo':'normal';
}

// ────────────────────────────────────────────
// SCORING
// ────────────────────────────────────────────
function getMaScore(t){
  var p=t.price,s9=t.sma9,m2=t.ma20,m5=t.ma50;
  if(!p||!m2)return 0;
  var sc=0;
  if(s9>0&&p>s9)sc+=4;if(p>m2)sc+=5;if(m5>0&&p>m5)sc+=6;
  if(s9>0&&m2>0&&s9>m2)sc+=3;if(m2>0&&m5>0&&m2>m5)sc+=3;
  if(m2>0&&Math.abs(p-m2)/m2<0.04)sc+=2;
  return Math.min(23,sc);
}
function score(t){
  var s=0;s+=t.narr*0.22;
  var on=t.cats.filter(function(c){return c.s===1;}).length;
  var pend=t.cats.filter(function(c){return c.s===null;}).length;
  s+=(on/t.cats.length)*18+(pend/t.cats.length)*3;
  var rsi=parseFloat(t.rsi)||50;
  s+=rsi>=40&&rsi<=70?16:rsi>=30&&rsi<40?11:rsi<30?7:rsi>80?4:10;
  s+=t.trend==='alcista'?12:t.trend==='lateral'?6:1;
  s+=getMaScore(t);s+=t.vol==='alto'?10:t.vol==='normal'?6:2;
  return Math.min(100,Math.round(s));
}
function scCol(s){return s>=75?'var(--g)':s>=50?'var(--y)':s>=30?'var(--txt2)':'var(--r)';}
function scCls(s){return s>=75?'hot':s>=50?'warn':s>=30?'cold':'danger';}
function getMaSigs(t){
  var p=t.price,s9=t.sma9,m2=t.ma20,m5=t.ma50,out=[];
  if(!p||!m2)return out;
  if(s9>0)out.push(p>s9?{txt:'P > SMA9',c:'var(--g)'}:{txt:'P < SMA9',c:'var(--r)'});
  out.push(p>m2?{txt:'P > MA20',c:'var(--g)'}:{txt:'P < MA20',c:'var(--r)'});
  if(m5>0)out.push(p>m5?{txt:'P > MA50',c:'var(--g)'}:{txt:'P < MA50',c:'var(--r)'});
  if(m2>0&&m5>0)out.push(m2>m5?{txt:'Golden Cross',c:'var(--g)'}:{txt:'Death Cross',c:'var(--r)'});
  return out;
}
function decision(t,sc){
  var ratio=t.price>0&&t.be>0?t.price/t.be:0;
  var bulls=getMaSigs(t).filter(function(m){return m.c==='var(--g)';}).length;
  if(sc>=80&&ratio>=0.90)return{cls:'extend',lbl:'EXTENDER TP',txt:'Momentum excepcional con precio cerca del BE. Considerar elevar TP1.'};
  if(sc>=80)return{cls:'hold',lbl:'ALTA CONVICCIÓN',txt:'Momentum muy fuerte. Mantener posición completa.'};
  if(sc>=55&&bulls>=3)return{cls:'hold',lbl:'MANTENER — MAs ALCISTAS',txt:'Momentum moderado con MAs alineadas al alza. Ejecutar sin dudar cuando llegue el TP1.'};
  if(sc>=55)return{cls:'hold',lbl:'MANTENER TPs',txt:'Momentum moderado. Ejecutar sin dudar cuando el precio llegue al TP1.'};
  if(sc>=30)return{cls:'wait',lbl:'ESPERAR CATALIZADORES',txt:'Momentum bajo. Precio bajo las MAs. Mantener en staking y esperar.'};
  return{cls:'danger',lbl:'REVISION ESTRATEGICA',txt:'Multiples señales débiles. No actuar impulsivamente.'};
}

// ────────────────────────────────────────────
// FORMAT
// ────────────────────────────────────────────
function fp(v){
  v=parseFloat(v)||0;
  if(v>=10000)return'$'+Math.round(v).toLocaleString('en-US');
  if(v>=100)return'$'+v.toFixed(2);if(v>=1)return'$'+v.toFixed(3);
  if(v>=0.01)return'$'+v.toFixed(4);return'$'+v.toFixed(5);
}
function fv(v){
  if(!v||v<=0)return'—';if(v>=1e9)return(v/1e9).toFixed(2)+'B';
  if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';
  return Math.round(v).toString();
}
function fmaDec(v){if(v<1)return 5;if(v<10)return 4;if(v<100)return 3;return 2;}

function updateCard(t){
  var sym=t.sym,p=t.price;
  var sc=score(t),col=scCol(sc),dec=decision(t,sc);
  // Card class
  var card=document.getElementById('tc_'+sym);if(card)card.className='tc '+scCls(sc);
  // Momentum
  var ms=document.getElementById('ms_'+sym),mb=document.getElementById('mb_'+sym);
  var fg=sc>=75?'linear-gradient(90deg,var(--g),#00ffb0)':sc>=50?'linear-gradient(90deg,var(--y),#ffd000)':sc>=30?'linear-gradient(90deg,var(--txt2),#6070a0)':'linear-gradient(90deg,var(--r),#ff7090)';
  if(ms){ms.textContent=sc+'/100';ms.style.color=col;}if(mb){mb.style.width=sc+'%';mb.style.background=fg;}
  // Price/PNL
  var pnl=p>0&&t.be>0?(p/t.be-1)*100:null;
  var pnlCol=pnl===null?'var(--txt3)':pnl>=0?'var(--g)':'var(--r)';
  var pr=document.getElementById('pr_'+sym);if(pr)pr.textContent=p>0?fp(p):'—';
  var pnlEl=document.getElementById('pnl_'+sym);
  if(pnlEl){
    if(pnl!==null){pnlEl.innerHTML=(pnl>=0?'&#129001; ':'&#128997; ')+pnl.toFixed(1)+'% vs BE';pnlEl.style.color=pnlCol;}
    else{pnlEl.textContent='—';}
  }
  // TP1
  if(p>0&&t.tp1>0){
    var tp1p=Math.min(100,(p/t.tp1)*100),tp1d=t.tp1>p?(t.tp1/p-1)*100:0;
    var tp1c=tp1p>=80?'var(--g)':tp1p>=50?'var(--y)':'var(--r)';
    var tv=document.getElementById('tp1v_'+sym),tf=document.getElementById('tp1f_'+sym),tp=document.getElementById('tp1p_'+sym);
    if(tv){tv.innerHTML=tp1p.toFixed(0)+'% &mdash; '+(tp1p>=100?'LISTO':'falta +'+tp1d.toFixed(1)+'%');tv.style.color=tp1c;}
    if(tf){tf.style.width=tp1p.toFixed(1)+'%';tf.style.background=tp1c;}
    if(tp)tp.textContent=fp(p);
  }
  // MA boxes
  var maDefs=[{lbl:'SMA 9',v:t.sma9,id:'sma9'},{lbl:'MA 20',v:t.ma20,id:'ma20'},{lbl:'MA 50',v:t.ma50,id:'ma50'}];
  maDefs.forEach(function(m){
    var el=document.getElementById(m.id+'v_'+sym);if(!el)return;
    if(!m.v||m.v<=0){el.textContent='—';el.style.color='var(--txt3)';}
    else{var ab=p>m.v;el.textContent=fp(m.v);el.style.color=ab?'var(--g)':'var(--r)';}
  });
  // Decision
  var decEl=document.getElementById('dec_'+sym);
  if(decEl){decEl.className='dec '+dec.cls;var dl=decEl.querySelector('.dec-lbl'),dt=decEl.querySelector('.dec-txt');if(dl)dl.textContent=dec.lbl;if(dt)dt.textContent=dec.txt;}
  updateGlobal();
}

function updateGlobal(){
  var avg=Math.round(TK.reduce(function(s,t){return s+score(t);},0)/TK.length);
  var gs=document.getElementById('gscore');if(gs){gs.textContent=avg;gs.style.color=scCol(avg);}
}

}

function fetchMASeq(idx,btn){

  var t=TK[idx];
  setBar('load','Calculando '+t.sym+' ('+(idx+1)+'/'+TK.length+')...');
  fetchMAOne(t,2,function(){setTimeout(function(){fetchMASeq(idx+1,btn);},1500);});
}
function fetchMAOne(t,retries,done){
  var url='https://api.coingecko.com/api/v3/coins/'+t.cg+'/market_chart?vs_currency=usd&days=60&interval=daily';
  fetch(url,{signal:AbortSignal.timeout(18000)})
    .then(function(r){
      if(r.status===429){if(retries>0){setTimeout(function(){fetchMAOne(t,retries-1,done);},3000);}else{maResults[t.sym]=null;done();}return null;}
      if(!r.ok)throw new Error(r.status);return r.json();
    })
    .then(function(data){
      if(!data)return;
      if(!data.prices||data.prices.length<20){maResults[t.sym]=null;}
      else{
        var prices=data.prices.map(function(p){return p[1];});
        var vols=data.total_volumes.map(function(v){return v[1];});
        maResults[t.sym]={sma9:calcSMA(prices,9),ma20:calcSMA(prices,20),ma50:calcSMA(prices,50),rsi:calcRSI(prices),volDia:vols[vols.length-1],vol:classifyVol(vols[vols.length-1],vols.slice(-20,-1))};
      }
      done();
    })
    .catch(function(){if(retries>0){setTimeout(function(){fetchMAOne(t,retries-1,done);},2000);}else{maResults[t.sym]=null;done();}});
}
function applyMAs(btn){
  var ok=0;
  TK.forEach(function(t){
    var r=maResults[t.sym];if(!r)return;
    t.sma9=r.sma9;t.ma20=r.ma20;t.ma50=r.ma50;t.rsi=r.rsi;t.volDia=r.volDia;t.vol=r.vol;t.maAuto=true;
    if(t.price>0&&t.ma20>0&&t.sma9>0){
      if(t.price>t.ma20&&t.sma9>t.ma20)t.trend='alcista';
      else if(t.price<t.ma20&&t.sma9<t.ma20)t.trend='bajista';
      else t.trend='lateral';
    }
    // Update manual input fields
    var s9el=document.getElementById('i_s9_'+t.sym);
    var m2el=document.getElementById('i_m2_'+t.sym);
    var m5el=document.getElementById('i_m5_'+t.sym);
    var rsel=document.getElementById('i_rsi_'+t.sym);
    if(s9el)s9el.value=r.sma9.toFixed(fmaDec(r.sma9));
    if(m2el)m2el.value=r.ma20.toFixed(fmaDec(r.ma20));
    if(m5el)m5el.value=r.ma50.toFixed(fmaDec(r.ma50));
    if(rsel)rsel.value=r.rsi;
    updateCard(t);ok++;
  });
  btn.textContent='ACTUALIZAR MAs Y RSI \u2014 Automático';
  if(ok===TK.length){setPill('pillM','on','MAs AUTO');setBar('ok','MAs y RSI calculados para '+ok+'/'+TK.length+' tokens');}
  else{setPill('pillM','warn','MAs PARCIAL '+ok+'/'+TK.length);setBar('err',ok+'/'+TK.length+' tokens — los demás: introduce manualmente');}
  setTimeout(function(){setBar('');},10000);
}

// ────────────────────────────────────────────
// SAVE
// ────────────────────────────────────────────
function saveDay(){
  saveLocal();
  var day={date:new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short',year:'2-digit'}),_raw:new Date().toDateString(),
    tokens:TK.map(function(t){var sc=score(t);return{sym:t.sym,price:t.price,rsi:t.rsi,score:sc,dec:decision(t,sc).cls,ma20:t.ma20,sma9:t.sma9,ma50:t.ma50,volDia:t.volDia};})};
  var hist=getHist().filter(function(h){return h._raw!==day._raw;});
  hist.unshift(day);if(hist.length>30)hist=hist.slice(0,30);setHist(hist);
  var ok=document.getElementById('saveok');ok.style.display='block';setTimeout(function(){ok.style.display='none';},2000);
}

// ────────────────────────────────────────────
// SUMMARY
// ────────────────────────────────────────────
function renderSummary(){
  var data=TK.map(function(t){return{t:t,sc:score(t),dec:decision(t,score(t))};});
  var avg=Math.round(data.reduce(function(s,d){return s+d.sc;},0)/data.length);
  var se=document.getElementById('shscore'),su=document.getElementById('shsub');
  if(se){se.textContent=avg;se.style.color=scCol(avg);}
  if(su)su.textContent=avg>=70?'Cartera en momentum alcista':avg>=50?'Momentum moderado — mantener':avg>=35?'Momento de espera':'Revision recomendada';
  var sorted=data.slice().sort(function(a,b){return b.sc-a.sc;});
  var maxSc=sorted[0].sc;
  var dcols={extend:'var(--g)',hold:'var(--y)',wait:'var(--txt3)',danger:'var(--r)'};
  var dlbls={extend:'EXTENDER',hold:'MANTENER',wait:'ESPERAR',danger:'REVISAR'};
  document.getElementById('rlist').innerHTML=sorted.map(function(d,i){
    var t=d.t,bw=maxSc>0?Math.round(d.sc/maxSc*100):0,dc=dcols[d.dec.cls];
    return '<div class="rrow"><div class="rn">#'+(i+1)+'</div><div class="rsym" style="color:'+t.col+'">'+t.sym+'</div><div class="rbar"><div class="rfill" style="width:'+bw+'%;background:'+t.col+'"></div></div><div class="rscore" style="color:'+scCol(d.sc)+'">'+d.sc+'</div><div class="rbadge" style="background:'+dc+'18;color:'+dc+';border:1px solid '+dc+'30">'+dlbls[d.dec.cls]+'</div></div>';
  }).join('');
  var tp1s=data.slice().sort(function(a,b){var pA=a.t.price&&a.t.tp1?a.t.price/a.t.tp1:0,pB=b.t.price&&b.t.tp1?b.t.price/b.t.tp1:0;return pB-pA;});
  document.getElementById('tp1list').innerHTML=tp1s.map(function(d,i){
    var t=d.t,pct=t.price&&t.tp1?Math.min(100,(t.price/t.tp1)*100):0;
    var dist=t.price&&t.tp1&&t.tp1>t.price?((t.tp1/t.price-1)*100).toFixed(1):0;
    var tc=pct>=80?'var(--g)':pct>=50?'var(--y)':'var(--r)';
    return '<div class="rrow"><div class="rn">#'+(i+1)+'</div><div class="rsym" style="color:'+t.col+'">'+t.sym+'</div><div class="rbar"><div class="rfill" style="width:'+pct.toFixed(0)+'%;background:'+tc+'"></div></div><div class="rscore" style="color:'+tc+'">'+pct.toFixed(0)+'%</div><div class="rbadge" style="color:'+tc+';">'+(pct>=100?'LISTO':'falta +'+dist+'%')+'</div></div>';
  }).join('');
}

// ────────────────────────────────────────────
// HISTORY
// ────────────────────────────────────────────
function renderHist(){
  var hist=getHist();
  if(!hist.length){document.getElementById('hwrap').innerHTML='<div class="hempty">Sin historial todavía.<br>Guarda datos diariamente.</div>';return;}
  var dcols={extend:'var(--g)',hold:'var(--y)',wait:'var(--txt3)',danger:'var(--r)'},dlbls={extend:'EXT',hold:'MAN',wait:'ESP',danger:'REV'};
  document.getElementById('hwrap').innerHTML=hist.map(function(h){
    var avg=h.tokens?Math.round(h.tokens.reduce(function(s,td){return s+(td.score||0);},0)/h.tokens.length):0;
    var rows=(h.tokens||[]).map(function(td){
      var t=null;for(var i=0;i<TK.length;i++){if(TK[i].sym===td.sym){t=TK[i];break;}}
      var c=t?t.col:'#888',sc=td.score||0,dc=dcols[td.dec]||'var(--txt3)';
      var pnl=td.price&&t?(td.price/t.be-1)*100:null,pc=pnl!==null?(pnl>=0?'var(--g)':'var(--r)'):'var(--txt2)';
      return '<div class="hrow"><div class="hs" style="color:'+c+'">'+td.sym+'</div><div class="hp" style="color:'+pc+'">'+fp(td.price)+'</div><div class="hm">MA20 '+(td.ma20?fp(td.ma20):'—')+'</div><div class="hr">RSI '+(td.rsi||'—')+'</div><div class="hsc" style="color:'+(sc>=70?'var(--g)':sc>=45?'var(--y)':'var(--txt3)')+'">'+sc+'/100</div><div class="hdc" style="background:'+dc+'18;color:'+dc+'">'+dlbls[td.dec]+'</div></div>';
    }).join('');
    return '<div class="hday"><div class="hdh"><span class="hdh-d">'+h.date+'</span><span class="hdh-a" style="color:'+scCol(avg)+'">Avg '+avg+'/100</span></div>'+rows+'</div>';
  }).join('');
}

// ────────────────────────────────────────────
// UI HELPERS
// ────────────────────────────────────────────
function setPill(id,type,txt){var p=document.getElementById(id);if(!p)return;p.className='pill'+(type?' '+type:'');p.textContent=txt;}
function setBar(type,txt){var b=document.getElementById('sbar');if(!type){b.className='sbar';return;}b.className='sbar '+type;b.textContent=txt||'';}
function goTab(n){
  ['t','s','h'].forEach(function(v){document.getElementById('view-'+v).classList.toggle('active',v===n);document.getElementById('tab-'+v).classList.toggle('active',v===n);});
  if(n==='s')renderSummary();if(n==='h')renderHist();
}

// ────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────
document.getElementById('hdate').textContent=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
loadSaved();
renderAll();
setTimeout(doFetchPrices,500);
setInterval(doFetchPrices,60000);
</script>
